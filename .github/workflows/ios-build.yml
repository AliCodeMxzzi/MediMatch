name: iOS Build (Unsigned IPA)

# Builds MediMatch on a hosted macOS runner and publishes an unsigned .ipa
# artifact. The .ipa can then be re-signed with a free Apple ID using
# Sideloadly or AltStore on Windows and installed on a personal iPhone.
#
# This workflow does NOT require an Apple Developer Program membership.
#
# Trigger options:
#   - push to main / pull request: automatic
#   - workflow_dispatch:           manual run from the Actions tab

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build unsigned IPA
    runs-on: macos-15
    timeout-minutes: 45

    env:
      PROJECT: MediMatch.xcodeproj
      SCHEME: MediMatch
      CONFIGURATION: Release
      ARCHIVE_PATH: build/MediMatch.xcarchive
      IPA_DIR: build/ipa
      IPA_NAME: MediMatch-unsigned.ipa

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain versions
        run: |
          set -euo pipefail
          sw_vers
          xcodebuild -version
          swift --version

      - name: Cache Swift Package dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved', '**/project.pbxproj') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Resolve Swift Package dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "$PROJECT" \
            -scheme "$SCHEME"

      - name: List available simulators (sanity check only)
        run: xcrun simctl list devices available || true

      - name: Archive (unsigned, generic iOS device)
        run: |
          set -euo pipefail
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination 'generic/platform=iOS' \
            -archivePath "$ARCHIVE_PATH" \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            EXPANDED_CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            ONLY_ACTIVE_ARCH=NO

      - name: Verify archive contents
        run: |
          set -euo pipefail
          APP_PATH="$ARCHIVE_PATH/Products/Applications/MediMatch.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "::error::Expected $APP_PATH not found inside archive."
            ls -lR "$ARCHIVE_PATH" || true
            exit 1
          fi
          echo "Archive contains:"
          ls -lh "$APP_PATH"

      - name: Package unsigned IPA (Payload zip)
        run: |
          set -euo pipefail
          rm -rf "$IPA_DIR"
          mkdir -p "$IPA_DIR/Payload"
          cp -R "$ARCHIVE_PATH/Products/Applications/MediMatch.app" \
                "$IPA_DIR/Payload/"
          # Strip any leftover code signature metadata to keep Sideloadly happy.
          rm -rf "$IPA_DIR/Payload/MediMatch.app/_CodeSignature" || true
          rm -f  "$IPA_DIR/Payload/MediMatch.app/embedded.mobileprovision" || true
          (cd "$IPA_DIR" && zip -ry "../$IPA_NAME" Payload >/dev/null)
          ls -lh "build/$IPA_NAME"

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: MediMatch-unsigned-ipa
          path: build/MediMatch-unsigned.ipa
          if-no-files-found: error
          retention-days: 14

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            ~/Library/Logs/DiagnosticReports
            ~/Library/Developer/Xcode/DerivedData/**/Logs
          if-no-files-found: ignore
          retention-days: 7
